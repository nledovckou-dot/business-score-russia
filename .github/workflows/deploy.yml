name: Deploy BSR to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FNS_API_KEY: ${{ secrets.FNS_API_KEY }}
          FALLBACK_LLM_API_KEY: ${{ secrets.FALLBACK_LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HH_APP_TOKEN: ${{ secrets.HH_APP_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          BSR_ALLOWED_EMAILS: ${{ secrets.BSR_ALLOWED_EMAILS }}
          BSR_BETA_EMAILS: ${{ secrets.BSR_BETA_EMAILS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          envs: REPO_URL,GEMINI_API_KEY,FNS_API_KEY,FALLBACK_LLM_API_KEY,ANTHROPIC_API_KEY,HH_APP_TOKEN,GOOGLE_CLIENT_ID,BSR_ALLOWED_EMAILS,BSR_BETA_EMAILS
          script: |
            set -e
            APP_DIR=/opt/business-score-russia

            # Clone or update repo
            if [ ! -d "$APP_DIR" ]; then
              sudo -n mkdir -p "$APP_DIR"
              sudo -n chown $(whoami):$(whoami) "$APP_DIR"
              cd "$APP_DIR"
              git init -b main
            else
              cd "$APP_DIR"
            fi
            git remote set-url origin "$REPO_URL" 2>/dev/null || git remote add origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main

            # Clear ALL Python bytecode cache to ensure fresh imports
            find "$APP_DIR" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            find "$APP_DIR" -name "*.pyc" -delete 2>/dev/null || true
            # Remove any stale 'app' package from venv (might have been installed via pip install -e .)
            rm -rf "$APP_DIR/.venv/lib/python*/site-packages/app" 2>/dev/null || true
            rm -rf "$APP_DIR/.venv/lib/python*/site-packages/app.egg-link" 2>/dev/null || true
            echo "Cleared all caches"

            # Setup .env
            printf '%s\n' \
              "REPORT_OUTPUT_DIR=app/storage/reports" \
              "STORE_BACKEND=file" \
              "BSR_ADMIN_TOKEN=bsr-admin-2026" \
              "BSR_REPORTS_PER_HOUR=30" \
              "GEMINI_API_KEY=${GEMINI_API_KEY}" \
              "FNS_API_KEY=${FNS_API_KEY}" \
              "OPENAI_API_KEY=${FALLBACK_LLM_API_KEY}" \
              "FALLBACK_LLM_API_KEY=${FALLBACK_LLM_API_KEY}" \
              "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
              "HH_APP_TOKEN=${HH_APP_TOKEN}" \
              "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
              "BSR_ALLOWED_EMAILS=${BSR_ALLOWED_EMAILS}" \
              "BSR_BETA_EMAILS=${BSR_BETA_EMAILS}" \
              > "$APP_DIR/.env"

            # Persistent directories
            mkdir -p "$APP_DIR/data/sessions"

            # System dependencies (whois for domain lookup, playwright deps for scrapling)
            sudo -n apt-get update -qq
            sudo -n apt-get install -y -qq whois 2>/dev/null || true

            # Python venv
            if [ ! -d "$APP_DIR/.venv" ]; then
              python3 -m venv "$APP_DIR/.venv"
            fi
            "$APP_DIR/.venv/bin/pip" install -q -r "$APP_DIR/requirements.txt"

            # Install Playwright Chromium for JS-heavy site scraping (supports ARM64)
            "$APP_DIR/.venv/bin/python3" -m playwright install chromium --with-deps 2>&1 | tail -10 || echo "Playwright install skipped"

            # Create reports directory
            mkdir -p "$APP_DIR/app/storage/reports"

            # Systemd service
            sudo -n cp "$APP_DIR/scripts/bsr.service" /etc/systemd/system/bsr.service
            sudo -n systemctl daemon-reload
            sudo -n systemctl enable bsr

            # Nginx config — always update timeout, preserve SSL certs
            sudo -n mkdir -p /etc/nginx/sites-enabled
            # Always update nginx config — remove default, ensure only BSR
            sudo -n rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
            sudo -n ls /etc/nginx/sites-enabled/ | xargs -I{} echo "nginx site: {}"
            sudo -n cp "$APP_DIR/scripts/nginx-bsr.conf" /etc/nginx/sites-enabled/bsr.conf
            # Remove any conflicting configs
            for f in /etc/nginx/sites-enabled/*; do
              [ "$f" = "/etc/nginx/sites-enabled/bsr.conf" ] && continue
              echo "Removing conflicting nginx config: $f"
              sudo -n rm -f "$f"
            done
            sudo -n nginx -t && sudo -n systemctl restart nginx || echo "nginx restart failed, check config"

            # Stop service and kill ALL stale uvicorn processes
            sudo -n systemctl stop bsr 2>/dev/null || true
            sleep 2
            # Kill any leftover uvicorn by exact binary path (not -f to avoid killing SSH)
            sudo -n killall -9 uvicorn 2>/dev/null || true
            sleep 1

            # Restart service
            sudo -n systemctl start bsr
            sleep 5

            # Firewall — allow :8090, remove any NAT/REDIRECT rules that conflict
            sudo -n ufw allow 8090/tcp 2>/dev/null || true
            sudo -n iptables -C INPUT -p tcp --dport 8090 -j ACCEPT 2>/dev/null || sudo -n iptables -I INPUT -p tcp --dport 8090 -j ACCEPT
            # Remove ALL NAT REDIRECT/DNAT rules for port 8090 (they break external access)
            sudo -n iptables -t nat -S 2>/dev/null | grep "8090" | while read rule; do
              echo "Removing NAT rule: $rule"
              sudo -n iptables -t nat $(echo "$rule" | sed 's/^-A/-D/') 2>/dev/null || true
            done
            echo "--- NAT rules after cleanup ---"
            sudo -n iptables -t nat -L -n 2>/dev/null | grep -E "809|808|REDIRECT|DNAT" | head -10 || echo "no NAT rules"

            # Verify deploy
            echo "=== Deploy verification ==="
            cd "$APP_DIR" && git log --oneline -1
            echo "--- Service status ---"
            sudo -n systemctl status bsr --no-pager | head -10
            echo "--- Health check ---"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8083/api/health)
            echo "uvicorn :8083 health -> HTTP $HTTP_CODE"
            HTTP_CODE_NGINX=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/api/health)
            echo "nginx :8090 health -> HTTP $HTTP_CODE_NGINX"
            echo "--- Landing content check ---"
            curl -s http://localhost:8083/ | wc -c | xargs -I{} echo "uvicorn landing: {} bytes"
            curl -s http://localhost:8083/ | head -3
            echo "--- Frontend files ---"
            ls -la "$APP_DIR/frontend/out/index.html" 2>/dev/null && echo "frontend/out/index.html EXISTS" || echo "frontend/out/index.html MISSING"
            ls "$APP_DIR/frontend/out/_next/static/" 2>/dev/null | head -5 || echo "_next/static MISSING"
            echo "--- BSR startup log ---"
            sudo -n journalctl -u bsr --no-pager -n 5 | grep -i "frontend\|BSR\|use_next" || echo "no frontend log"
            echo "--- External access test ---"
            EXTERNAL_IP=$(curl -s ifconfig.me)
            curl -s -o /dev/null -w "external :8090 health: %{http_code}" "http://$EXTERNAL_IP:8090/api/health" 2>/dev/null || echo "external test failed"
            echo ""
            echo "--- _next CSS check ---"
            curl -s -o /dev/null -w "CSS: %{http_code}" http://localhost:8083/_next/static/css/f3d501abebb70e4c.css
            echo ""
            echo "--- IPTABLES NAT ---"
            sudo -n iptables -t nat -L -n 2>/dev/null | grep -i "809\|808\|REDIRECT\|DNAT" | head -10
            echo "--- Listening ports ---"
            ss -tlnp 2>/dev/null | grep -E "809|808" || echo "ss failed"
            echo "--- All uvicorn processes ---"
            ps aux 2>/dev/null | grep uvicorn | grep -v grep
            echo "--- Xray/VPN processes ---"
            ps aux 2>/dev/null | grep -i "xray\|v2ray\|vless" | grep -v grep | head -5
            echo "--- Reports on disk ---"
            ls "$APP_DIR/app/storage/reports/report_"*.html 2>/dev/null | wc -l | xargs -I{} echo "Total: {} reports"
            echo "--- Recent errors ---"
            sudo -n journalctl -u bsr --no-pager -n 50 --since "2 min ago" 2>/dev/null | grep -i "error\|exception\|traceback" | tail -5

