name: Deploy BSR to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FNS_API_KEY: ${{ secrets.FNS_API_KEY }}
          FALLBACK_LLM_API_KEY: ${{ secrets.FALLBACK_LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HH_APP_TOKEN: ${{ secrets.HH_APP_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          BSR_ALLOWED_EMAILS: ${{ secrets.BSR_ALLOWED_EMAILS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          envs: REPO_URL,GEMINI_API_KEY,FNS_API_KEY,FALLBACK_LLM_API_KEY,ANTHROPIC_API_KEY,HH_APP_TOKEN,GOOGLE_CLIENT_ID,BSR_ALLOWED_EMAILS
          script: |
            set -e
            APP_DIR=/opt/business-score-russia

            # Clone or update repo
            if [ ! -d "$APP_DIR" ]; then
              sudo -n mkdir -p "$APP_DIR"
              sudo -n chown $(whoami):$(whoami) "$APP_DIR"
              cd "$APP_DIR"
              git init -b main
            else
              cd "$APP_DIR"
            fi
            git remote set-url origin "$REPO_URL" 2>/dev/null || git remote add origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main

            # Clear ALL Python bytecode cache to ensure fresh imports
            find "$APP_DIR" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            find "$APP_DIR" -name "*.pyc" -delete 2>/dev/null || true
            # Remove any stale 'app' package from venv (might have been installed via pip install -e .)
            rm -rf "$APP_DIR/.venv/lib/python*/site-packages/app" 2>/dev/null || true
            rm -rf "$APP_DIR/.venv/lib/python*/site-packages/app.egg-link" 2>/dev/null || true
            echo "Cleared all caches"

            # Setup .env
            printf '%s\n' \
              "REPORT_OUTPUT_DIR=app/storage/reports" \
              "STORE_BACKEND=file" \
              "BSR_ADMIN_TOKEN=bsr-admin-2026" \
              "BSR_REPORTS_PER_HOUR=30" \
              "GEMINI_API_KEY=${GEMINI_API_KEY}" \
              "FNS_API_KEY=${FNS_API_KEY}" \
              "OPENAI_API_KEY=${FALLBACK_LLM_API_KEY}" \
              "FALLBACK_LLM_API_KEY=${FALLBACK_LLM_API_KEY}" \
              "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" \
              "HH_APP_TOKEN=${HH_APP_TOKEN}" \
              "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
              "BSR_ALLOWED_EMAILS=${BSR_ALLOWED_EMAILS}" \
              > "$APP_DIR/.env"

            # Persistent directories
            mkdir -p "$APP_DIR/data/sessions"

            # System dependencies (whois for domain lookup, playwright deps for scrapling)
            sudo -n apt-get update -qq
            sudo -n apt-get install -y -qq whois 2>/dev/null || true

            # Python venv
            if [ ! -d "$APP_DIR/.venv" ]; then
              python3 -m venv "$APP_DIR/.venv"
            fi
            "$APP_DIR/.venv/bin/pip" install -q -r "$APP_DIR/requirements.txt"

            # Install Playwright Chromium for JS-heavy site scraping (supports ARM64)
            "$APP_DIR/.venv/bin/python3" -m playwright install chromium --with-deps 2>&1 | tail -10 || echo "Playwright install skipped"

            # Create reports directory
            mkdir -p "$APP_DIR/app/storage/reports"

            # Systemd service
            sudo -n cp "$APP_DIR/scripts/bsr.service" /etc/systemd/system/bsr.service
            sudo -n systemctl daemon-reload
            sudo -n systemctl enable bsr

            # Nginx config — only copy if certbot hasn't modified it (preserve SSL)
            if ! grep -q "ssl_certificate" /etc/nginx/sites-enabled/bsr.conf 2>/dev/null; then
              sudo -n mkdir -p /etc/nginx/sites-enabled
              sudo -n cp "$APP_DIR/scripts/nginx-bsr.conf" /etc/nginx/sites-enabled/bsr.conf
            fi
            sudo -n nginx -t && sudo -n systemctl reload nginx || echo "nginx reload failed, check config"

            # Stop service first, then start fresh
            sudo -n systemctl stop bsr 2>/dev/null || true
            sleep 2

            # Restart service
            sudo -n systemctl start bsr
            sleep 5

            # Verify the code is correct
            echo "=== Verify deployed code ==="
            grep "REPORTS_PER_HOUR" "$APP_DIR/app/security.py"

            # Debug: check where Python actually imports from
            cd "$APP_DIR" && "$APP_DIR/.venv/bin/python3" -c "import sys; print('sys.path:', sys.path[:5]); import app.security; print('file:', app.security.__file__); print('RPH:', app.security.REPORTS_PER_HOUR)"

            # Firewall
            sudo -n ufw allow 8090/tcp 2>/dev/null || true
            sudo -n iptables -C INPUT -p tcp --dport 8090 -j ACCEPT 2>/dev/null || sudo -n iptables -I INPUT -p tcp --dport 8090 -j ACCEPT

            # Diagnostics
            echo "=== BSR service status ==="
            sudo -n systemctl status bsr --no-pager | head -10
            echo "=== Checking port 8083 ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8083/ || echo "not yet ready"
            echo ""
            echo "=== Checking port 8090 (nginx) ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/ || echo "not yet ready"

            # ── Full infra diagnostic ──
            echo ""
            echo "===== INFRA DIAGNOSTIC ====="

            echo "--- DDG TEST ---"
            timeout 8 curl -sS -o /dev/null -w "DDG: HTTP %{http_code}, time %{time_total}s\n" -A "Mozilla/5.0" "https://html.duckduckgo.com/html/?q=test" 2>&1 || echo "DDG: BLOCKED/TIMEOUT"

            echo "--- GEMINI SEARCH GROUNDING ---"
            GKEY=$(grep "^GEMINI_API_KEY=" .env 2>/dev/null | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'" | tr -d ' ')
            if [ -n "$GKEY" ]; then
              RESP=$(timeout 25 curl -sS -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GKEY" -H "Content-Type: application/json" -d '{"contents":[{"parts":[{"text":"Найди ИНН компании Додо Пицца"}]}],"tools":[{"google_search":{}}],"generationConfig":{"temperature":0,"maxOutputTokens":256}}' 2>&1)
              echo "$RESP" | "$APP_DIR/.venv/bin/python3" -c "import sys,json; d=json.load(sys.stdin); c=d.get('candidates',[{}])[0]; gm=c.get('groundingMetadata',{}); chunks=gm.get('groundingChunks',[]); print(f'Grounding chunks: {len(chunks)}'); [print(f'  - {ch.get(\"web\",{}).get(\"title\",\"\")[:60]} | {ch.get(\"web\",{}).get(\"uri\",\"\")}') for ch in chunks[:5]]; print(f'Answer: {c.get(\"content\",{}).get(\"parts\",[{}])[0].get(\"text\",\"\")[:300]}')" 2>/dev/null || echo "Gemini raw: $(echo $RESP | head -c 500)"
            else
              echo "SKIP - no GEMINI_API_KEY"
            fi

            echo "--- RUSSIAN PROXY ---"
            timeout 10 curl -sS -o /dev/null -w "Proxy: HTTP %{http_code}, time %{time_total}s\n" -X POST http://158.160.158.164:8888/scrape -H "X-Proxy-Token: bsr-proxy-2026" -H "Content-Type: application/json" -d '{"url":"https://dodopizza.ru"}' 2>&1 || echo "Proxy: UNREACHABLE"

            echo "--- PLAYWRIGHT ---"
            "$APP_DIR/.venv/bin/python3" -c "from playwright.sync_api import sync_playwright; print('Playwright: OK')" 2>&1 | head -3

            echo "--- FNS API ---"
            FKEY=$(grep "^FNS_API_KEY=" .env 2>/dev/null | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'" | tr -d ' ')
            timeout 8 curl -sS "https://api-fns.ru/api/search?q=%D0%B4%D0%BE%D0%B4%D0%BE+%D0%BF%D0%B8%D1%86%D1%86%D0%B0&key=${FKEY:-demo}" 2>&1 | "$APP_DIR/.venv/bin/python3" -c "import sys,json; d=json.load(sys.stdin); items=d.get('items',[]); print(f'FNS results: {len(items)}'); [print(f'  - {it.get(\"ЮЛ\",{}).get(\"НаимСокрЮЛ\",\"?\")} ИНН:{it.get(\"ЮЛ\",{}).get(\"ИНН\",\"?\")}') for it in items[:3]]" 2>/dev/null || echo "FNS: FAILED"

            echo "--- REPORTS ON DISK ---"
            ls -lht "$APP_DIR/app/storage/reports/report_"*.html 2>/dev/null | head -5
            echo "Total: $(ls "$APP_DIR/app/storage/reports/report_"*.html 2>/dev/null | wc -l) reports"

            echo "--- RECENT ERRORS ---"
            sudo -n journalctl -u bsr --no-pager -n 100 --since "5 min ago" 2>/dev/null | grep -i "error\|exception\|traceback" | tail -10



