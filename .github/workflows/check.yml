name: Check Analysis

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check today reports and metrics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            cd /opt/business-score-russia

            echo "=== 1. METRICS JSONL ==="
            MFILE=data/metrics.jsonl
            if [ -f "$MFILE" ]; then
              echo "Total lines: $(wc -l < $MFILE)"
              echo "Last 20 entries:"
              tail -20 "$MFILE"
            else
              echo "NOT FOUND"
            fi

            echo ""
            echo "=== 2. SESSION FILES ==="
            ls -lht data/sessions/*.json 2>/dev/null | head -20

            echo ""
            echo "=== 3. REPORTS ON DISK ==="
            ls -lht app/storage/reports/report_*.html 2>/dev/null | head -15
            echo "Total: $(ls app/storage/reports/report_*.html 2>/dev/null | wc -l)"

            echo ""
            echo "=== 4. JOURNALCTL TODAY ==="
            sudo -n journalctl -u bsr --no-pager --since "2026-03-14" 2>/dev/null | grep -iE "step|pipeline|report|session|analyz|company|done|complet|error" | tail -50

            echo ""
            echo "=== 5. ACTIVE SESSIONS API ==="
            curl -s "http://localhost:8083/admin/api/sessions?token=bsr-admin-2026" 2>/dev/null | python3 -m json.tool 2>/dev/null | head -100
