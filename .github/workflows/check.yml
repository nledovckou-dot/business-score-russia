name: Check Analysis

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check analysis status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            echo "=== Session 8bb590b1e8b8 ==="
            curl -s http://localhost:8083/api/analyze/8bb590b1e8b8 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "Session not found or finished"

            echo ""
            echo "=== Search Fallback Logs ==="
            sudo -n journalctl -u bsr --no-pager -n 500 --since "20 min ago" 2>/dev/null | grep -i "proxy ddg\|gemini search\|duckduckgo.*fail\|switching\|grounding\|via proxy\|fallback\|search.*return" | tail -20

            echo ""
            echo "=== Pipeline Steps ==="
            sudo -n journalctl -u bsr --no-pager -n 500 --since "20 min ago" 2>/dev/null | grep -i "\[step\|revisi\|board\|quality\|report_\|done\|complet\|scrape_method\|fns\|innн\|competitor" | tail -30

            echo ""
            echo "=== Errors ==="
            sudo -n journalctl -u bsr --no-pager -n 500 --since "20 min ago" 2>/dev/null | grep -i "error\|exception\|traceback\|failed" | tail -15

            echo ""
            echo "=== Reports ==="
            DIR=/opt/business-score-russia/app/storage/reports
            ls -lht $DIR/report_*.html 2>/dev/null | head -5
