name: Check Analysis

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check analysis status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            echo "=== All Reports ==="
            DIR=/opt/business-score-russia/app/storage/reports
            ls -lht $DIR/report_*.html 2>/dev/null | head -15

            echo ""
            echo "=== Recent Logs (search/gemini) ==="
            sudo -n journalctl -u bsr --no-pager -n 100 --since "2 hours ago" 2>/dev/null | grep -i "duckduckgo\|gemini search\|search.*fail\|grounding\|fallback.*gemini\|switching.*gemini" | tail -20

            echo ""
            echo "=== Recent Logs (pipeline) ==="
            sudo -n journalctl -u bsr --no-pager -n 60 --since "30 min ago" 2>/dev/null | grep -i "step\|revisi\|board\|quality\|error\|report\|block\|done\|complete" | tail -25

            echo ""
            echo "=== Active Sessions ==="
            curl -s http://localhost:8083/api/sessions 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No sessions endpoint"
