name: Check Analysis

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check analysis status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            echo "=== 1. SERVICE STATUS ==="
            sudo systemctl status bsr --no-pager -l 2>/dev/null | head -15

            echo ""
            echo "=== 2. DEPLOY LOG (last restart) ==="
            sudo -n journalctl -u bsr --no-pager -n 10 --since "10 min ago" 2>/dev/null | head -10

            echo ""
            echo "=== 3. GEMINI_API_KEY set? ==="
            grep -c "GEMINI_API_KEY" /opt/business-score-russia/.env 2>/dev/null && echo "YES" || echo "NO - MISSING!"

            echo ""
            echo "=== 4. TEST DDG (should timeout/fail) ==="
            timeout 8 curl -sS -o /dev/null -w "DDG: HTTP %{http_code}, time %{time_total}s" "https://html.duckduckgo.com/html/?q=test" 2>&1 || echo "DDG: BLOCKED/TIMEOUT"

            echo ""
            echo "=== 5. TEST GEMINI SEARCH API ==="
            GKEY=$(grep GEMINI_API_KEY /opt/business-score-russia/.env 2>/dev/null | cut -d= -f2 | tr -d '"' | tr -d "'")
            if [ -n "$GKEY" ]; then
              RESP=$(timeout 15 curl -sS -X POST \
                "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GKEY" \
                -H "Content-Type: application/json" \
                -d '{"contents":[{"parts":[{"text":"Найди ИНН компании Додо Пицца"}]}],"tools":[{"google_search":{}}],"generationConfig":{"temperature":0,"maxOutputTokens":256}}' 2>&1)
              echo "$RESP" | python3 -c "
import sys,json
d=json.load(sys.stdin)
c=d.get('candidates',[{}])[0]
gm=c.get('groundingMetadata',{})
chunks=gm.get('groundingChunks',[])
print(f'Grounding chunks: {len(chunks)}')
for ch in chunks[:5]:
  w=ch.get('web',{})
  print(f'  - {w.get(\"title\",\"\")} | {w.get(\"uri\",\"\")}')
text=c.get('content',{}).get('parts',[{}])[0].get('text','')
print(f'Answer: {text[:200]}')
" 2>/dev/null || echo "Gemini API error: $(echo $RESP | head -c 300)"
            else
              echo "SKIP - no GEMINI_API_KEY"
            fi

            echo ""
            echo "=== 6. TEST RUSSIAN PROXY ==="
            timeout 10 curl -sS -o /dev/null -w "Proxy: HTTP %{http_code}, time %{time_total}s" \
              -X POST http://158.160.158.164:8888/scrape \
              -H "X-Proxy-Token: bsr-proxy-2026" \
              -H "Content-Type: application/json" \
              -d '{"url":"https://dodopizza.ru"}' 2>&1 || echo "Proxy: UNREACHABLE"

            echo ""
            echo "=== 7. PLAYWRIGHT INSTALLED? ==="
            cd /opt/business-score-russia && python3 -c "from playwright.sync_api import sync_playwright; print('Playwright: OK')" 2>&1 || echo "Playwright: NOT INSTALLED"

            echo ""
            echo "=== 8. 2GIS API TEST ==="
            timeout 8 curl -sS -o /dev/null -w "2GIS: HTTP %{http_code}, time %{time_total}s" \
              "https://catalog.api.2gis.com/3.0/items?q=Додо+Пицца+Москва&key=demo&page_size=1" 2>&1 || echo "2GIS: FAILED"

            echo ""
            echo "=== 9. FNS API TEST ==="
            timeout 8 curl -sS -o /dev/null -w "FNS: HTTP %{http_code}, time %{time_total}s" \
              "https://api-fns.ru/api/search?q=додо+пицца&key=demo" 2>&1 || echo "FNS: FAILED"

            echo ""
            echo "=== 10. REPORTS ON DISK ==="
            DIR=/opt/business-score-russia/app/storage/reports
            ls -lht $DIR/report_*.html 2>/dev/null | head -10
            echo "Total: $(ls $DIR/report_*.html 2>/dev/null | wc -l) reports"
