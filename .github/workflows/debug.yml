name: VPS Status

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Launch test analysis
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 3m
          script: |
            echo "=== BSR Service Status ==="
            sudo -n systemctl status bsr --no-pager | head -5

            echo ""
            echo "=== Launch Test Analysis: Додо Пицца ==="
            curl -s -X POST http://localhost:8083/api/analyze \
              -H "Content-Type: application/json" \
              -d '{"url": "https://dodopizza.ru", "company_name": "Додо Пицца"}' | head -5

            echo ""
            echo "=== Recent Logs ==="
            sudo -n journalctl -u bsr --no-pager -n 30 | tail -20
