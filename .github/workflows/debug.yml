name: Debug VPS

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            echo "=== Launch CDEK ==="
            curl -s -X POST http://127.0.0.1:8083/api/analyze -H "Content-Type: application/json" -d '{"url":"https://cdek.ru"}' | head -c 500
            echo ""
            echo "=== Active sessions ==="
            curl -s http://127.0.0.1:8083/api/sessions | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            sessions = data.get('sessions', [])
            for s in sessions:
                sid = s.get('session_id','')[:12]
                status = s.get('status','')
                step = s.get('current_step','')
                company = s.get('company_name','') or s.get('url','')
                print(f'{sid}  {status:12s}  {step:30s}  {company}')
            print(f'Total: {len(sessions)}')
            "
            echo "=== Reports on disk ==="
            ls -la /opt/business-score-russia/app/storage/reports/ | tail -20
