name: VPS Status

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS status via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            echo "=== BSR Service ==="
            sudo -n systemctl status bsr --no-pager | head -8

            echo ""
            echo "=== Reports ==="
            DIR=/opt/business-score-russia/app/storage/reports
            COUNT=$(ls -1 $DIR/report_*.html 2>/dev/null | wc -l)
            echo "Total reports: $COUNT"
            echo ""
            for f in $DIR/report_*.html; do
              [ -f "$f" ] || continue
              ID=$(basename "$f" .html | sed 's/report_//')
              TITLE=$(grep -oP '<title>\K[^<]+' "$f" 2>/dev/null | head -1)
              SIZE=$(du -h "$f" | cut -f1)
              DATE=$(stat -c %y "$f" | cut -d. -f1)
              echo "$ID | $SIZE | $DATE | $TITLE"
            done

            echo ""
            echo "=== Active Sessions ==="
            curl -s http://localhost:8083/api/health 2>/dev/null || echo "Health endpoint unavailable"

            echo ""
            echo "=== Disk Space ==="
            df -h / | tail -1

            echo ""
            echo "=== Memory ==="
            free -h | head -2
