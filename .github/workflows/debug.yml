name: Debug VPS

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check logs via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 3m
          script: |
            echo "=== Service status ==="
            systemctl status bsr --no-pager | head -8
            echo "=== Journal errors (last 1h) ==="
            journalctl -u bsr --since "1 hour ago" --no-pager | grep -i "error\|exception\|traceback\|critical\|failed" | tail -30
            echo "=== Journal last 50 lines ==="
            journalctl -u bsr --since "1 hour ago" --no-pager | tail -50
            echo "=== Reports count ==="
            ls /opt/business-score-russia/app/storage/reports/*.html 2>/dev/null | wc -l
            echo "=== Memory usage ==="
            free -h | head -2
            echo "=== Disk usage ==="
            df -h /opt | head -2
