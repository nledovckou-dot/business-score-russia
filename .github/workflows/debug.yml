name: VPS Status

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Launch test + check status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 3m
          script: |
            echo "=== Launch Analysis: Додо Пицца ==="
            RESP=$(curl -s -X POST http://localhost:8083/api/analyze \
              -H "Content-Type: application/json" \
              -d '{"url": "https://dodopizza.ru", "company_name": "Додо Пицца"}')
            echo "$RESP"
            SID=$(echo "$RESP" | grep -oP '"session_id":"[^"]+' | cut -d'"' -f4)
            echo "Session: $SID"

            echo ""
            echo "=== Existing Reports ==="
            DIR=/opt/business-score-russia/app/storage/reports
            ls -lt $DIR/report_*.html 2>/dev/null | head -5 | awk '{print $5, $6, $7, $8, $9}'
