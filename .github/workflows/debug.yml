name: Debug VPS

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check report contents via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            DIR=/opt/business-score-russia/app/storage/reports
            echo "=== All reports with company names ==="
            for f in $DIR/report_*.html; do
              ID=$(basename "$f" .html | sed 's/report_//')
              COMPANY=$(grep -oP '<title>\K[^<]+' "$f" 2>/dev/null | head -1)
              SIZE=$(du -h "$f" | cut -f1)
              DATE=$(stat -c %y "$f" | cut -d. -f1)
              echo "$ID | $SIZE | $DATE | $COMPANY"
            done
            echo ""
            echo "=== DNS report (03b2729a) board review ==="
            python3 -c "
import re, sys
with open('$DIR/report_03b2729a.html') as f:
    html = f.read()
# Find quality score
m = re.search(r'quality.*?score.*?(\d+)', html, re.IGNORECASE)
if m: print(f'Quality score: {m.group(1)}')
# Find board review section
m = re.search(r'board.*?review|совет.*?директор', html, re.IGNORECASE)
if m: print(f'Board review: found at pos {m.start()}')
# Check for QA Director
if 'QA Director' in html or 'Директор по качеству' in html:
    print('QA Director: PRESENT')
else:
    print('QA Director: NOT FOUND')
" 2>/dev/null
            echo ""
            echo "=== CDEK report (cbb07ef1) board review ==="
            python3 -c "
import re
with open('$DIR/report_cbb07ef1.html') as f:
    html = f.read()
m = re.search(r'quality.*?score.*?(\d+)', html, re.IGNORECASE)
if m: print(f'Quality score: {m.group(1)}')
if 'QA Director' in html or 'Директор по качеству' in html:
    print('QA Director: PRESENT')
else:
    print('QA Director: NOT FOUND')
" 2>/dev/null
