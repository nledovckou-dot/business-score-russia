name: Debug VPS

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Launch test reports via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            echo "=== Service status ==="
            systemctl status bsr --no-pager | head -5
            echo ""
            echo "=== Existing reports ==="
            ls -la /opt/business-score-russia/app/storage/reports/ | wc -l
            echo ""
            echo "=== Launch DNS (B2C) ==="
            curl -s -X POST http://127.0.0.1:8083/api/analyze \
              -H "Content-Type: application/json" \
              -d '{"url":"https://dns-shop.ru"}'
            echo ""
            sleep 15
            echo "=== Launch CDEK (B2B) ==="
            curl -s -X POST http://127.0.0.1:8083/api/analyze \
              -H "Content-Type: application/json" \
              -d '{"url":"https://cdek.ru"}'
            echo ""
