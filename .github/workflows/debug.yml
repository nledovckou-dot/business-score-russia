name: Debug VPS

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check report contents via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            DIR=/opt/business-score-russia/app/storage/reports
            echo "=== All reports ==="
            for f in $DIR/report_*.html; do
              ID=$(basename "$f" .html | sed 's/report_//')
              TITLE=$(grep -oP '<title>\K[^<]+' "$f" 2>/dev/null | head -1)
              SIZE=$(du -h "$f" | cut -f1)
              DATE=$(stat -c %y "$f" | cut -d. -f1)
              echo "$ID | $SIZE | $DATE | $TITLE"
            done
            echo ""
            echo "=== Check QA Director in new reports ==="
            for ID in 03b2729a cbb07ef1; do
              FILE="$DIR/report_${ID}.html"
              if [ -f "$FILE" ]; then
                echo -n "$ID: "
                if grep -q "QA Director\|Директор по качеству" "$FILE"; then
                  echo "QA Director PRESENT"
                else
                  echo "QA Director NOT FOUND"
                fi
                echo -n "  quality: "
                grep -oP 'quality.*?score.*?\d+' "$FILE" | head -1 || echo "not found"
              fi
            done
