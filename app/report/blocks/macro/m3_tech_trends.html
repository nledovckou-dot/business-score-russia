{# M3: Technology Trends — cards #}
{% from '_macros.html' import info_tip %}

{% if tech_trends %}
<div class="card">
    <h3>Технологические тренды</h3>
    <div class="grid-3" style="margin-top:16px;">
        {% if tech_trends is string %}
        <div style="background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:20px;">
            <p style="color:var(--text); font-size:0.92em; line-height:1.5;">{{ tech_trends }}</p>
        </div>
        {% else %}
        {% for trend in tech_trends %}
        <div style="background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:20px;">
            <p style="color:var(--text); font-size:0.92em; line-height:1.5;">{{ trend }}</p>
        </div>
        {% endfor %}
        {% endif %}
    </div>
</div>
{% endif %}
