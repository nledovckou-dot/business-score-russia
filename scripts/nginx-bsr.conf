# BSR — прямой доступ по IP:8090
server {
    listen 8090;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }
}

# BSR — домены рос-скор.рф и росскор.рф (HTTP → HTTPS redirect)
server {
    listen 80;
    server_name xn----ttbkcgedb.xn--p1ai www.xn----ttbkcgedb.xn--p1ai xn--j1ahbfdda.xn--p1ai www.xn--j1ahbfdda.xn--p1ai;

    # certbot webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# BSR — HTTPS
server {
    listen 443 ssl http2;
    server_name xn----ttbkcgedb.xn--p1ai www.xn----ttbkcgedb.xn--p1ai xn--j1ahbfdda.xn--p1ai www.xn--j1ahbfdda.xn--p1ai;

    ssl_certificate /etc/letsencrypt/live/xn--j1ahbfdda.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--j1ahbfdda.xn--p1ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }
}
